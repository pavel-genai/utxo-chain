name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: swift build
      - run: swift test --enable-code-coverage
      - name: Convert coverage to lcov
        run: |
          BIN_PATH=$(swift build --show-bin-path)
          PROFDATA=$(find .build -name "default.profdata" -type f | head -1)
          TEST_BIN=$(find "$BIN_PATH" -name "*.xctest" -type d | head -1)
          if [ -n "$PROFDATA" ] && [ -n "$TEST_BIN" ]; then
            EXEC="$TEST_BIN/Contents/MacOS/$(basename "$TEST_BIN" .xctest)"
            xcrun llvm-cov export -format="lcov" "$EXEC" -instr-profile="$PROFDATA" > lcov.info
          fi
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
